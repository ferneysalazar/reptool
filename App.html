/* ── App Root ─────────────────────────────────────────────────────────────── */
const App = () => {

  const [page, setPage]               = React.useState(saved.page || 'dashboard');
  const [sidebarOpen, setSidebarOpen] = React.useState(window.innerWidth >= 960);

  React.useEffect(() => {
    const onResize = () => setSidebarOpen(window.innerWidth >= 960);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  React.useEffect(() => {
    localStorage.setItem('vindexrl_state', JSON.stringify({page}));
  }, [page]);

  const shift = sidebarOpen ? '265px' : '0px';

  return (
    <div className="min-h-screen flex flex-col">
      <Header open={sidebarOpen} setOpen={setSidebarOpen}/>
      <Sidebar active={page} setActive={setPage} open={sidebarOpen} setOpen={setSidebarOpen}/>
